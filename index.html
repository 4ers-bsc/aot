<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIGHT10 — Last One Standing</title>
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div class="shell">
    <main class="arena-shell">
      <div class="world-vignette"></div>
      <div class="world-grain"></div>
      <div class="world-scanlines"></div>
      <div class="world-glitch world-glitch-a"></div>
      <div class="world-glitch world-glitch-b"></div>

      <!-- 3D canvas (background) -->
      <div id="arenaMount" class="arena-mount"></div>

      <!-- ===== Top nav ===== -->
      <nav class="site-nav">
        <div class="site-nav-brand">FIGHT10</div>
        <div class="site-nav-actions">
          <span class="fight10-balance hidden" id="fight10Balance">— $FIGHT10</span>
          <button class="nav-profile-btn hidden" id="profileBtn" type="button">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm-5 6a5 5 0 0 1 10 0H3z"/></svg>
            PROFILE
          </button>
          <button class="nav-connect-btn" id="signInWalletBtn" type="button">Connect Wallet</button>
          <a class="x-nav" href="#" aria-label="Twitter / X">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          </a>
        </div>
      </nav>

      <!-- Dynamic views mount point -->
      <div id="views-root"></div>

    </main>
  </div>

  <!-- App loading splash -->
  <div class="app-loading" id="appLoading">
    <div class="app-loading-inner">
      <div class="app-loading-logo-wrap">
        <img src="/logo.png" alt="FIGHT10" class="app-loading-logo" />
        <div class="app-loading-ring"></div>
      </div>
      <div class="app-loading-brand">FIGHT10</div>
      <div class="app-loading-tagline">Last One Standing</div>
      <div class="app-loading-bar-track">
        <div class="app-loading-bar-fill" id="loadingBarFill"></div>
      </div>
      <div class="app-loading-status" id="loadingStatus">Initialising…</div>
    </div>
  </div>

  <!-- GL HF FIGHT banner -->
  <div class="glhf-banner" id="glhfBanner">GL HF, FIGHT!</div>

  <!-- Match-starting transition (lobby full) -->
  <div class="match-starting" id="matchStarting">
    <div class="ms-spinner"></div>
    <div class="ms-text">MATCH STARTING</div>
    <div class="ms-count" id="matchStartCount">3</div>
  </div>

  <!-- Top-left status log -->
  <div class="log-feed" id="logFeed"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIGHT10 — Last One Standing</title>
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div class="shell">
    <main class="arena-shell">
      <div class="world-vignette"></div>
      <div class="world-grain"></div>
      <div class="world-scanlines"></div>
      <div class="world-glitch world-glitch-a"></div>
      <div class="world-glitch world-glitch-b"></div>

      <!-- 3D canvas (background) -->
      <div id="arenaMount" class="arena-mount"></div>

      <!-- ===== Top nav ===== -->
      <nav class="site-nav">
        <a class="site-nav-brand" href="#" aria-label="FIGHT10 — home">
          <img src="/logo.png" alt="FIGHT10" class="site-nav-logo" />
        </a>
        <div class="site-nav-actions">
          <button class="fight10-balance hidden" id="fight10Balance" type="button" title="View your $FIGHT10 holdings">— $FIGHT10</button>
          <button class="nav-profile-btn hidden" id="profileBtn" type="button">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm-5 6a5 5 0 0 1 10 0H3z"/></svg>
            PROFILE
          </button>
          <button class="nav-connect-btn" id="signInWalletBtn" type="button">Connect Wallet</button>
          <a class="x-nav" href="#" aria-label="Twitter / X">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          </a>
          <button class="nav-hamburger" id="navHamburgerBtn" type="button" aria-label="Menu" aria-expanded="false" aria-controls="navMenu">
            <span></span><span></span><span></span>
          </button>
        </div>
        <div class="nav-menu" id="navMenu">
          <button class="nav-menu-item" id="menuPlayPvpBtn" type="button">PLAY PVP</button>
          <button class="nav-menu-item" id="menuLeaderboardBtn" type="button">LEADERBOARD</button>
          <button class="nav-menu-item" id="menuHowToBtn" type="button">HOW TO PLAY</button>
          <button class="nav-menu-item" id="menuWhitepaperBtn" type="button">WHITEPAPER</button>
          <button class="nav-menu-item nav-menu-item-signout hidden" id="signOutBtn" type="button">SIGN OUT</button>
        </div>
      </nav>

      <!-- Idle-landing cue: the map is playable — click it to take control -->
      <div id="homePlayPrompt"><span class="hpp-dot"></span>Click the battlefield to play</div>

      <!-- Dynamic views mount point -->
      <div id="views-root"></div>

    </main>
  </div>

  <!-- App loading splash -->
  <div class="app-loading" id="appLoading">
    <div class="app-loading-inner">
      <div class="app-loading-logo-wrap">
        <img src="/logo.png" alt="FIGHT10" class="app-loading-logo" />
        <div class="app-loading-ring"></div>
      </div>
      <div class="app-loading-brand">FIGHT10</div>
      <div class="app-loading-tagline">Last One Standing</div>
      <div class="app-loading-bar-track">
        <div class="app-loading-bar-fill" id="loadingBarFill"></div>
      </div>
      <div class="app-loading-status" id="loadingStatus">Initialising…</div>
    </div>
  </div>

  <!-- Boot failsafe: if the app module fails to load or crashes before it can
       remove the splash (dead CDN, blocked script, unsupported browser), show
       the reason and a retry button instead of "Initialising…" forever. -->
  <script>
    (function () {
      var shown = false;
      function bootFail(msg) {
        var splash = document.getElementById("appLoading");
        if (!splash || shown) return; // splash gone = app booted fine
        shown = true;
        var status = document.getElementById("loadingStatus");
        if (status) status.textContent = msg;
        var retry = document.createElement("button");
        retry.id = "loadingRetryBtn";
        retry.textContent = "RETRY";
        retry.style.cssText = "margin-top:14px;padding:8px 26px;background:#c8940a;color:#000;" +
          "border:none;border-radius:4px;font:600 13px sans-serif;letter-spacing:0.08em;cursor:pointer";
        retry.onclick = function () { window.location.reload(); };
        var inner = splash.querySelector(".app-loading-inner");
        if (inner) inner.appendChild(retry);
      }
      // Resource/script failures can be transient or non-fatal, so wait a beat
      // and only report if the splash is still up (i.e. init() never finished).
      function deferFail() { setTimeout(function () { bootFail("Failed to start — check your connection and retry."); }, 4000); }
      window.addEventListener("error", deferFail, true);
      window.addEventListener("unhandledrejection", deferFail);
      // Watchdog: nothing errored, but the app never came up either.
      setTimeout(function () { bootFail("Taking too long — check your connection and retry."); }, 25000);
    })();
  </script>

  <!-- GL HF FIGHT banner -->
  <div class="glhf-banner" id="glhfBanner">GL HF, FIGHT!</div>

  <!-- Pre-results suspense spinner (shown briefly before the winners screen) -->
  <div class="results-loading hidden" id="resultsLoading">
    <div class="rl-spinner"></div>
  </div>

  <!-- Match-starting transition (lobby full) -->
  <div class="match-starting" id="matchStarting">
    <div class="ms-spinner"></div>
    <div class="ms-text">MATCH STARTING</div>
    <div class="ms-count" id="matchStartCount">3</div>
  </div>

  <!-- Landing free-play hint: shown while playing the player on the home map -->
  <button class="home-play-hint hidden" id="homePlayHint" type="button">
    Press <kbd>Esc</kbd> to return &nbsp;·&nbsp; <span class="hph-move">WASD</span> or click to move
  </button>

  <!-- Top-left status log -->
  <div class="log-feed" id="logFeed"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
